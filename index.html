<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Apero Hub - Premium App Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f97316;
      --primary-glow: rgba(249, 115, 22, 0.3);
      --secondary: #fb923c;
      --bg-main: #fffaf5;
      --card-bg: rgba(255, 255, 255, 0.82);
      --text-main: #431407;
      --text-muted: #9a3412;
      --glass-border: rgba(249, 115, 22, 0.2);
      --card-radius: 44px; /* Squircle style */
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
    .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg-main); overflow: hidden; }
    .blob { position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(249, 115, 22, 0.18) 0%, transparent 70%); border-radius: 50%; animation: drift 30s infinite alternate ease-in-out; }
    .blob-2 { background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, transparent 70%); width: 700px; height: 700px; right: -10%; top: 10%; animation-duration: 22s; }
    @keyframes drift { from { transform: translate(-10%, -10%) scale(1); } to { transform: translate(25%, 30%) scale(1.1); } }
    header { padding: 80px 20px 20px; text-align: center; }
    header h1 { font-size: clamp(3rem, 10vw, 4.5rem); font-weight: 800; letter-spacing: -0.05em; background: linear-gradient(135deg, var(--text-main) 40%, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-section { max-width: 500px; margin: 40px auto 30px; padding: 0 20px; position: sticky; top: 20px; z-index: 100; }
    .search-wrapper { position: relative; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 2px solid var(--glass-border); border-radius: 24px; box-shadow: 0 10px 40px rgba(249, 115, 22, 0.08); }
    .search-wrapper input { width: 100%; background: transparent; border: none; padding: 18px 20px 18px 55px; color: var(--text-main); font-size: 1.05rem; font-weight: 700; outline: none; }
    .search-wrapper::before { content: '🔍'; position: absolute; left: 22px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.6; }
    main { flex: 1; width: 100%; max-width: 1440px; margin: 0 auto; padding: 20px 40px 100px; }
    #appContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 35px; }
    .app-card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1.5px solid var(--glass-border); border-radius: var(--card-radius); padding: 40px; display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; transform: translateY(40px); animation: reveal 0.8s forwards; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02); }
    .app-card:hover { transform: translateY(-10px) scale(1.05); background: #ffffff; border-color: var(--primary); box-shadow: 0 35px 70px -15px rgba(249, 115, 22, 0.2), 0 0 30px var(--primary-glow); }
    .app-icon-box { width: 110px; height: 110px; margin: 0 auto 28px; border-radius: 32px; background: linear-gradient(135deg, #fff7ed, #fff); box-shadow: 0 15px 35px rgba(249, 115, 22, 0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .app-icon { width: 100%; height: 100%; border-radius: 28px; object-fit: cover; }
    .badge { font-size: 0.8rem; font-weight: 800; padding: 7px 16px; border-radius: 14px; text-transform: uppercase; margin-bottom: 25px; align-self: center; }
    .badge.android { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
    .badge.ios { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    .app-title { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 12px; color: var(--text-main); letter-spacing: -0.02em; }
    .app-desc { font-size: 1.05rem; color: var(--text-muted); text-align: center; margin-bottom: 35px; flex-grow: 1; font-weight: 500; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .btn { padding: 18px 12px; border-radius: 22px; font-weight: 700; font-size: 0.9rem; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.4s; }
    .btn:active { transform: scale(0.92); }
    .btn-dev { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
    .btn-live { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .btn-full { grid-column: span 2; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-full:hover { background: var(--primary); color: #fff; }
    footer { padding: 80px 20px; text-align: center; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; border-top: 1px solid var(--glass-border); }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { #appContainer { grid-template-columns: 1fr; } .search-section { top: 10px; } }
  </style>
</head>
<body>
  <div class="bg-animation"><div class="blob"></div><div class="blob blob-2"></div></div>
  <header><h1>Apero Hub</h1></header>
  <section class="search-section"><div class="search-wrapper"><input type="text" id="searchInput" placeholder="Tìm kiếm ứng dụng nhanh..." oninput="filterApps()"></div></section>
  <main><div id="appContainer"></div></main>
  <footer><p>&copy; 2026 Apero Hub. Powered by Platinum Engine.</p></footer>
  <script>
    let allApps = [];
    const formatUrl = (url, isIOS) => url && isIOS ? "itms-services://?action=download-manifest&url=" + encodeURIComponent(url) : url;
    const renderApps = (apps) => {
      const container = document.getElementById("appContainer"); container.innerHTML = "";
      if (apps.length === 0) { container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-muted); font-weight: 700; font-size: 1.2rem;">🔍 Không có kết quả nào.</div>'; return; }
      apps.forEach((app, index) => {
        const isIOS = (app.platform || "").toLowerCase().includes("ios");
        const devUrl = formatUrl(app.downloads?.dev, isIOS);
        const prodUrl = formatUrl(app.downloads?.prod, isIOS);
        const aabUrl = app.downloads?.aab || "";
        const card = document.createElement("article"); card.className = "app-card"; card.style.animationDelay = `${index * 0.08}s`;
        card.innerHTML = `<div class="app-icon-box"><img src="${app.icon || 'https://via.placeholder.com/150'}" class="app-icon" alt="${app.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=f97316&color=fff'"></div>
          <div class="badge-row"><span class="badge ${isIOS ? 'ios' : 'android'}">${app.platform || 'Android'}</span></div>
          <h2 class="app-title">${app.name}</h2><p class="app-desc">${app.description || 'Hệ sinh thái ứng dụng Apero chuẩn Platinum.'}</p>
          <div class="btn-grid">${devUrl ? `<a href="${devUrl}" class="btn btn-dev">🔧 Dev Build</a>` : ""} ${prodUrl ? `<a href="${prodUrl}" class="btn btn-live">🚀 Live Build</a>` : ""} ${aabUrl ? `<a href="${aabUrl}" class="btn btn-full">📦 Cài đặt bộ bản AAB</a>` : ""}</div>`;
        container.appendChild(card);
      });
    };
    const filterApps = () => {
      const query = document.getElementById("searchInput").value.toLowerCase();
      renderApps(allApps.filter(app => app.name.toLowerCase().includes(query) || (app.description && app.description.toLowerCase().includes(query))));
    };
    fetch("apps.json").then(res => res.json()).then(data => { allApps = data.apps || []; renderApps(allApps); }).catch(err => { document.getElementById("appContainer").innerHTML = '<div style="color: #ef4444; font-weight: 800; text-align: center; grid-column: 1/-1;">❌ Lỗi truy xuất dữ liệu.</div>'; });
  </script>
</body>
</html>
